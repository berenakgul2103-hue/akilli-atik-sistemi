<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoScan AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
    <style>
        body { background: #052e16; color: white; font-family: sans-serif; overflow: hidden; }
        #reader__scan_region video { object-fit: cover !important; border-radius: 2rem; }
    </style>
</head>
<body>
    <div id="home-page" class="flex flex-col min-h-screen p-6 justify-between bg-gradient-to-b from-[#052e16] to-black">
        <div class="space-y-4">
            <h1 class="text-3xl font-bold text-green-400">EcoScan AI</h1>
            <p class="text-gray-300">Barkodu çerçevenin içine getirin ve netleşmesini bekleyin.</p>
            <div id="status" class="hidden p-4 bg-green-500/20 border border-green-500 rounded-2xl text-center">
                <p id="scanned-text" class="font-mono font-bold text-xl"></p>
            </div>
        </div>
        <button onclick="startScan()" class="w-full bg-green-500 py-5 rounded-3xl text-black font-black text-xl shadow-2xl">TARAMAYI BAŞLAT</button>
    </div>

    <div id="scan-container" class="hidden fixed inset-0 bg-black z-50 flex-col items-center justify-center p-4">
        <div id="reader" class="w-full max-w-sm rounded-3xl overflow-hidden"></div>
        <button onclick="stopScan()" class="mt-10 px-8 py-3 bg-white/10 rounded-full text-white">İptal Et</button>
    </div>

    <script>
        let scanner;

        function startScan() {
            document.getElementById('scan-container').style.display = 'flex';
            scanner = new Html5Qrcode("reader");
            
            const config = { 
                fps: 20, // Daha hızlı kare hızı
                qrbox: { width: 250, height: 250 },
                aspectRatio: 1.0
            };

            // Kamerayı başlat ve barkodu yakala
            scanner.start(
                { facingMode: "environment" }, 
                config,
                (decodedText) => {
                    // OKUMA BAŞARILI
                    document.getElementById('scanned-text').innerText = "Sonuç: " + decodedText;
                    document.getElementById('status').classList.remove('hidden');
                    stopScan();
                    alert("Barkod Algılandı: " + decodedText);
                },
                (errorMessage) => {
                    // Sürekli hata basmasın diye burayı boş bırakıyoruz
                }
            ).catch((err) => {
                alert("Kamera hatası: " + err);
            });
        }

        function stopScan() {
            if (scanner) {
                scanner.stop().then(() => {
                    document.getElementById('scan-container').style.display = 'none';
                });
            }
        }
    </script>
</body>
</html>
