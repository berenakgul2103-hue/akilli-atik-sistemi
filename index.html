<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoScan - Akıllı Atık Takibi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        eco: { 100: '#dcfce7', 200: '#bbf7d0', 400: '#4ade80', 700: '#15803d', 800: '#166534', 900: '#14532d', 950: '#052e16' },
                        moss: { 100: '#f0fdf4', 300: '#86efac', 700: '#15803d' }
                    }
                }
            }
        }
    </script>
    <style>
        body { background: linear-gradient(to bottom, #052e16, #0b1f19, #081612); min-height: 100vh; color: #f1f5f9; font-family: sans-serif; }
    </style>
</head>
<body>
    <div id="app"></div>

    <script>
        // Dashboard içeriğini simüle eden basit JS
        const app = document.getElementById('app');
        
        function render(isLoading) {
            app.innerHTML = `
            <section class="mx-auto flex min-h-screen w-full max-w-md flex-col justify-between px-5 py-8">
                <div class="space-y-5">
                    <div class="inline-flex items-center gap-2 rounded-full border border-green-700/70 bg-green-900/40 px-3 py-1.5 text-sm font-medium text-green-200 backdrop-blur-md">
                        <svg viewBox="0 0 24 24" fill="none" class="h-4 w-4" stroke="currentColor" stroke-width="1.8"><path d="M19 5c-6.5 0-12 4.2-12 10 0 2.3 1.8 4 4.2 4 4 0 8.8-3.7 8.8-14Z"/><path d="M8 18c1.4-3.2 4.1-5.7 8-7.5"/></svg>
                        EcoScan
                    </div>
                    <h1 class="text-3xl font-semibold tracking-tight text-[#effaf3]">Akıllı Atık Takibi</h1>
                    <p class="text-sm text-green-100/70">Kurulum tamamlandı. Tasarım başarıyla yayına alındı.</p>

                    <div class="grid grid-cols-2 gap-3">
                        <div class="rounded-2xl border border-green-800/60 bg-gradient-to-b from-green-900/45 to-green-950/55 p-4 shadow-lg backdrop-blur-sm">
                            <div class="mb-3 inline-flex rounded-lg bg-green-400/20 p-2 text-green-100">
                                ${isLoading ? '<div class="h-5 w-5 border-2 border-green-200 border-t-transparent animate-spin rounded-full"></div>' : '<svg viewBox="0 0 24 24" fill="none" class="h-5 w-5" stroke="currentColor" stroke-width="1.8"><path d="m12 3 1.9 4.8L19 9.7l-3.9 3.3L16.2 18 12 15.4 7.8 18 9 13 5 9.7l5.1-1.9L12 3Z"/></svg>'}
                            </div>
                            <p class="text-xs text-green-100/70">Toplam Tasarruf</p>
                            ${isLoading ? '<span class="mt-2 block h-6 w-24 animate-pulse rounded-md bg-green-700/40"></span>' : '<p class="mt-1 text-lg font-semibold text-[#f3fff7]">0.00 kg CO2</p>'}
                        </div>
                        <div class="rounded-2xl border border-green-700/50 bg-gradient-to-b from-green-700/20 to-green-950/55 p-4 shadow-lg backdrop-blur-sm">
                            <div class="mb-3 inline-flex rounded-lg bg-green-300/20 p-2 text-green-100">
                                ${isLoading ? '<div class="h-5 w-5 border-2 border-green-200 border-t-transparent animate-spin rounded-full"></div>' : '<svg viewBox="0 0 24 24" fill="none" class="h-5 w-5" stroke="currentColor" stroke-width="1.8"><path d="M12 21v-5m0 0 4-4h-3l3-4h-3l2-3h-6l2 3H8l3 4H8l4 4Z"/></svg>'}
                            </div>
                            <p class="text-xs text-green-100/70">Etki Kartı</p>
                            ${isLoading ? '<span class="mt-2 block h-6 w-16 animate-pulse rounded-md bg-green-700/40"></span>' : '<p class="mt-1 text-lg font-semibold text-[#f3fff7]">0 Ağaç</p>'}
                        </div>
                    </div>
                </div>

                <button class="inline-flex w-full items-center justify-center gap-2 rounded-2xl bg-gradient-to-r from-green-400 to-green-300 px-5 py-4 text-base font-semibold text-green-950 shadow-xl transition-all active:scale-95" ${isLoading ? 'disabled' : ''}>
                    ${isLoading ? 'Yükleniyor...' : 'Tarama Başlat'}
                </button>
            </section>
            `;
        }

        // Başlangıçta yükleniyor göster
        render(true);

        // 1.8 saniye sonra gerçek veriyi göster
        setTimeout(() => {
            render(false);
        }, 1800);
    </script>
</body>
</html>
