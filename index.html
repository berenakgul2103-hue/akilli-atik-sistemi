<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoScan - Gerçek Barkod Okuyucu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { background: #052e16; color: #f1f5f9; font-family: sans-serif; margin: 0; overflow-x: hidden; }
        .page { display: none; min-height: 100vh; width: 100%; flex-direction: column; }
        .active { display: flex; }
        #reader { width: 100% !important; border: none !important; }
        #reader__dashboard { background: white; color: black; padding: 10px; border-radius: 10px; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="home-page" class="page active justify-between px-5 py-8 bg-gradient-to-b from-[#052e16] to-[#081612]">
        <div class="space-y-6">
            <div class="inline-flex items-center gap-2 rounded-full border border-green-700/70 bg-green-900/40 px-3 py-1.5 text-sm font-medium text-green-200">
                🌱 EcoScan Pro
            </div>
            <h1 class="text-4xl font-bold tracking-tight text-white">Akıllı Atık Takibi</h1>
            <p class="text-green-100/70">Barkod okuma modülü aktif. Atıkları tarayarak doğayı korumaya başla.</p>

            <div class="bg-green-900/20 border border-green-800/50 p-6 rounded-3xl shadow-xl">
                <p class="text-xs uppercase tracking-widest text-green-400 font-bold">Son Okunan Atık</p>
                <p id="last-scanned" class="mt-2 text-xl font-medium text-white italic">Henüz tarama yapılmadı</p>
            </div>
        </div>

        <button onclick="startScanning()" class="w-full bg-green-400 py-5 rounded-2xl text-green-950 font-extrabold text-lg shadow-[0_10px_30px_rgba(74,222,128,0.3)] active:scale-95 transition-all">
            TARAMAYI BAŞLAT 📸
        </button>
    </div>

    <div id="scan-page" class="page items-center p-5 bg-black">
        <h2 class="text-green-400 font-bold mb-4">Barkodu Çerçevenin İçine Alın</h2>
        <div id="reader" class="rounded-3xl overflow-hidden border-2 border-green-500 shadow-[0_0_20px_#4ade80]"></div>
        
        <button onclick="stopScanning()" class="mt-10 px-8 py-3 bg-red-500/20 border border-red-500 rounded-full text-red-100">
            İptal Et
        </button>
    </div>

    <script>
        let html5QrCode;

        function startScanning() {
            document.getElementById('home-page').classList.remove('active');
            document.getElementById('scan-page').classList.add('active');

            html5QrCode = new Html5Qrcode("reader");
            const config = { fps: 10, qrbox: { width: 250, height: 250 } };

            html5QrCode.start({ facingMode: "environment" }, config, (decodedText) => {
                // BARKOD OKUNDUĞUNDA BURASI ÇALIŞIR
                document.getElementById('last-scanned').innerText = "Barkod: " + decodedText;
                stopScanning();
                alert("Başarılı! Okunan Barkod: " + decodedText);
            });
        }

        function stopScanning() {
            if (html5QrCode) {
                html5QrCode.stop().then(() => {
                    document.getElementById('scan-page').classList.remove('active');
                    document.getElementById('home-page').classList.add('active');
                });
            } else {
                document.getElementById('scan-page').classList.remove('active');
                document.getElementById('home-page').classList.add('active');
            }
        }
    </script>
</body>
</html>
