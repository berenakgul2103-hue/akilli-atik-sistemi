<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoScan AI Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/quagga@0.12.1/dist/quagga.min.js"></script>
    <style>
        body { background: #052e16; color: white; font-family: sans-serif; overflow: hidden; }
        #interactive.viewport { position: relative; width: 100%; height: 100%; }
        #interactive.viewport canvas, #interactive.viewport video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; border-radius: 2rem; }
    </style>
</head>
<body>
    <div id="home-page" class="flex flex-col min-h-screen p-6 justify-between bg-gradient-to-b from-[#052e16] to-black">
        <div class="space-y-6">
            <h1 class="text-4xl font-black text-green-400 italic">EcoScan</h1>
            <div class="bg-white/5 border border-white/10 p-6 rounded-[2.5rem] backdrop-blur-xl">
                <p class="text-xs font-bold text-green-300 uppercase tracking-tighter mb-2">Sistem Durumu</p>
                <p id="status-text" class="text-lg font-medium text-gray-200">Kamera Hazır. Analiz Bekleniyor...</p>
            </div>
        </div>
        <button onclick="startScan()" class="w-full bg-green-400 py-6 rounded-[2rem] text-black font-black text-xl shadow-[0_20px_50px_rgba(74,222,128,0.3)] active:scale-95 transition-all">
            TARAMAYI BAŞLAT
        </button>
    </div>

    <div id="scan-container" class="hidden fixed inset-0 bg-black z-50 flex flex-col p-4">
        <div id="interactive" class="viewport flex-1 relative overflow-hidden rounded-[3rem] border-2 border-green-500/50">
            </div>
        <button onclick="location.reload()" class="mt-6 w-full py-4 bg-white/10 rounded-2xl text-white font-bold">Vazgeç</button>
    </div>

    <script>
        function startScan() {
            document.getElementById('scan-container').classList.remove('hidden');
            
            Quagga.init({
                inputStream: {
                    name: "Live",
                    type: "LiveStream",
                    target: document.querySelector('#interactive'),
                    constraints: { facingMode: "environment" }
                },
                decoder: {
                    readers: ["code_128_reader", "ean_reader", "ean_8_reader", "upc_reader"]
                }
            }, function(err) {
                if (err) { alert("Hata: " + err); return; }
                Quagga.start();
            });

            Quagga.onDetected(function(data) {
                const code = data.codeResult.code;
                Quagga.stop();
                document.getElementById('scan-container').classList.add('hidden');
                document.getElementById('status-text').innerHTML = `📦 <b>Atık Algılandı:</b><br>${code}`;
                document.getElementById('home-page').classList.add('bg-green-900/40');
                alert("Barkod Okundu: " + code);
            });
        }
    </script>
</body>
</html>
