<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoScan - Akıllı Atık Takibi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: linear-gradient(to bottom, #052e16, #0b1f19, #081612); min-height: 100vh; color: #f1f5f9; font-family: sans-serif; overflow: hidden; }
        .video-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.6); display: none; align-items: center; justify-content: center; z-index: 50; }
    </style>
</head>
<body>
    <div id="app"></div>
    <div id="camera-overlay" class="video-overlay flex-col">
        <div class="relative w-64 h-64 border-2 border-green-400 rounded-3xl overflow-hidden shadow-[0_0_20px_#4ade80]">
            <video id="video" class="w-full h-full object-cover" autoplay playsinline></video>
            <div class="absolute inset-0 border-[20px] border-black/40 pointer-events-none"></div>
            <div class="absolute top-1/2 left-0 w-full h-0.5 bg-green-400 animate-bounce"></div>
        </div>
        <button onclick="closeCamera()" class="mt-8 px-6 py-2 bg-red-500/20 border border-red-500 rounded-full text-red-100">Kapat</button>
    </div>

    <script>
        function render(isLoading) {
            document.getElementById('app').innerHTML = `
            <section class="mx-auto flex min-h-screen w-full max-w-md flex-col justify-between px-5 py-8">
                <div class="space-y-5">
                    <div class="inline-flex items-center gap-2 rounded-full border border-green-700/70 bg-green-900/40 px-3 py-1.5 text-sm font-medium text-green-200">
                        EcoScan
                    </div>
                    <h1 class="text-3xl font-semibold tracking-tight text-[#effaf3]">Akıllı Atık Takibi</h1>
                    <p class="text-sm text-green-100/70">Tasarım ve Kamera Modülü başarıyla entegre edildi.</p>
                </div>

                <button onclick="startCamera()" class="inline-flex w-full items-center justify-center gap-2 rounded-2xl bg-gradient-to-r from-green-400 to-green-300 px-5 py-4 text-base font-semibold text-green-950 shadow-xl transition-all active:scale-95">
                    Tarama Başlat
                </button>
            </section>`;
        }

        async function startCamera() {
            const overlay = document.getElementById('camera-overlay');
            const video = document.getElementById('video');
            overlay.style.display = 'flex';
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                video.srcObject = stream;
            } catch (err) {
                alert("Kamera izni reddedildi veya cihazda kamera bulunamadı.");
                overlay.style.display = 'none';
            }
        }

        function closeCamera() {
            const video = document.getElementById('video');
            if (video.srcObject) {
                video.srcObject.getTracks().forEach(track => track.stop());
            }
            document.getElementById('camera-overlay').style.display = 'none';
        }

        render(false);
    </script>
</body>
</html>
